<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Color Picker 🎨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Advanced Color Picker </h1>
        <input type="color" id="colorInput" />
        <p id="colorCode">#000000</p>
        <button id="copyButton" class="Button">Copy Color Code.</button>

        <div class="complementary-colors">
            <h2>complementary-colors</h2>
            <div id="complementaryContainer"></div>
        </div>

        <button id="saveColorButton"class='Button'>Save Color</button>
        <div class="favorites">
            <h2>Favorite Colors</h2>
            <div id="favoritesContainer"></div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
