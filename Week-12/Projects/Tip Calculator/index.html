<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator for Resto's.</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Tip Calculator</h1>

        <label for="billAmount">Bill Amount:</label>
        <input type="number" id="billAmount" placeholder="Enter Bill Amount">

        <label for="tipPercentage">Tip Percentage</label>
        <input type="number" id="tipPercentage" placeholder="Tip Amount">

        <label for="numPeople">Number of Peoples</label>
        <input type="number" placeholder="No. of Peoples" id="numPeople">

        <button id="calculateButton">Calculate Tip</button>

        <p id="totalTip">Total Tip: $0.00</p>
        <p id="tipPerPerson">Tip Per Person: $0.00</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
