<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CountDown Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="text-strip-container">
    <p class="text-strip">🚀 Welcome to the CountDown Timer! Set your goals and track your time.</p>
</div>
    <div class="container">
        <h1>CountDown Timer</h1>
        <input type="number" id='timeInput' placeholder="Enter Time In Second">
        <button id="startBtn">Start CountDown</button>
        <button id="pause">Pause</button>
        <button id="resume">Resume</button>
        <p id="countDownDisplay"></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
